name: CI-CD Pipeline for Python App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout Source Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2️⃣ Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3️⃣ Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4️⃣ Build & Push Docker Image
    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5️⃣ Replace image inside deploy.yml
    - name: Update K8s Image in deploy.yml
      run: |
        sed -i "s|image:.*|image: ${steps.login-ecr.outputs.registry}/${{ secrets.ECR_REPOSITORY }}:latest|g" deploy.yml

    # 6️⃣ Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # 7️⃣ Connect to EKS Cluster
    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    # 8️⃣ Apply EKS Deployment
    - name: Deploy to EKS
      run: |
        kubectl apply -f deploy.yml -n ${{ secrets.EKS_NAMESPACE }}

    # 9️⃣ Verify Rollout
    - name: Verify Deployment Rollout
      run: |
        kubectl rollout status deployment/python-probes-demo -n ${{ secrets.EKS_NAMESPACE }}
