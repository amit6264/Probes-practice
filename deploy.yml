apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-probes-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-probes-demo
  template:
    metadata:
      labels:
        app: python-probes-demo
    spec:
      containers:
        - name: python-app
          image: REPLACE_ME_IMAGE
          ports:
            - containerPort: 8080

          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
